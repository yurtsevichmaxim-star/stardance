<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анкета</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --border: #2e2c28;
      --accent: #c9a96e;
      --accent-soft: rgba(201,169,110,0.12);
      --text: #f0ece4;
      --muted: #6b6760;
      --success: #7ec8a4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 56px 52px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Accent line top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 52px; right: 52px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .step-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 40px;
    }

    .question-block {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      position: absolute;
      width: calc(100% - 104px);
    }

    .question-block.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
      position: relative;
      width: 100%;
    }

    .question-block.exit {
      opacity: 0;
      transform: translateY(-14px);
      position: absolute;
      width: calc(100% - 104px);
    }

    label {
      display: block;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    input[type="text"],
    select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      padding: 10px 0 14px;
      outline: none;
      transition: border-color 0.3s;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }

    input[type="text"]::placeholder { color: var(--muted); font-style: italic; }
    input[type="text"]:focus,
    select:focus { border-bottom-color: var(--accent); }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '↓';
      position: absolute;
      right: 2px;
      bottom: 16px;
      color: var(--accent);
      font-size: 16px;
      pointer-events: none;
      font-family: 'DM Sans', sans-serif;
    }

    select option {
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
    }

    select option[value=""] { color: var(--muted); }

    .btn {
      margin-top: 40px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn svg { transition: transform 0.25s; }
    .btn:hover svg { transform: translateX(4px); }

    /* Progress */
    .progress {
      display: flex;
      gap: 6px;
      margin-bottom: 48px;
    }

    .progress-dot {
      width: 24px;
      height: 2px;
      background: var(--border);
      transition: background 0.4s;
    }

    .progress-dot.done { background: var(--accent); }
    .progress-dot.active { background: var(--accent); opacity: 0.5; }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 16px 0;
    }

    .success-screen.show { display: block; }

    .check-icon {
      width: 56px;
      height: 56px;
      border: 1px solid var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: var(--success);
      font-size: 22px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .success-screen p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .error-msg {
      color: #e07070;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .card { padding: 40px 28px; }
      .question-block { width: calc(100% - 56px); }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Progress dots -->
  <div class="progress">
    <div class="progress-dot active" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
  </div>

  <div id="form-area">

    <!-- Q1 -->
    <div class="question-block active" id="q1">
      <div class="step-label">Вопрос 1 из 2</div>
      <h1>Ваше имя</h1>
      <label for="name-input">Введите имя</label>
      <input type="text" id="name-input" placeholder="Иван Иванов" autocomplete="off">
      <div class="error-msg" id="err-name">Пожалуйста, введите ваше имя</div>
      <button class="btn" id="btn-next" onclick="goToQ2()">
        Далее
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Q2 -->
    <div class="question-block" id="q2">
      <div class="step-label">Вопрос 2 из 2</div>
      <h1>Ваш возраст</h1>
      <label for="age-select">Выберите диапазон</label>
      <div class="select-wrap">
        <select id="age-select">
          <option value="">— Выбрать —</option>
          <option value="10-15">10 – 15 лет</option>
          <option value="15-25">15 – 25 лет</option>
          <option value="25-30">25 – 30 лет</option>
        </select>
      </div>
      <div class="error-msg" id="err-age">Пожалуйста, выберите возраст</div>
      <button class="btn" id="btn-submit" onclick="submitForm()">
        Отправить
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="spinner" id="spinner"></div>
    </div>

  </div>

  <!-- Success -->
  <div class="success-screen" id="success">
    <div class="check-icon">✓</div>
    <h2>Спасибо!</h2>
    <p>Ваши ответы успешно записаны.<br>Мы ценим ваше время.</p>
  </div>

</div>

<script>
  // ← ВСТАВЬТЕ СЮДА ВАШ URL ИЗ GOOGLE APPS SCRIPT
  const API_URL = 'https://script.google.com/macros/s/AKfycbxxCYE6x_wzGPsbN1FBrOLt7GuOYSo-J7sijul1vwEaNzmaiowo0QJdRsk2PrIBZki1/exec';

  function goToQ2() {
    const name = document.getElementById('name-input').value.trim();
    const err = document.getElementById('err-name');

    if (!name) {
      err.style.display = 'block';
      document.getElementById('name-input').focus();
      return;
    }
    err.style.display = 'none';

    // Progress
    document.getElementById('dot-1').classList.remove('active');
    document.getElementById('dot-1').classList.add('done');
    document.getElementById('dot-2').classList.add('active');

    // Animate transition
    const q1 = document.getElementById('q1');
    const q2 = document.getElementById('q2');
    q1.classList.add('exit');
    q1.classList.remove('active');
    setTimeout(() => {
      q1.style.display = 'none';
      q2.classList.add('active');
    }, 400);
  }

  async function submitForm() {
    const age = document.getElementById('age-select').value;
    const err = document.getElementById('err-age');
    const spinner = document.getElementById('spinner');
    const btn = document.getElementById('btn-submit');

    if (!age) {
      err.style.display = 'block';
      return;
    }
    err.style.display = 'none';

    const name = document.getElementById('name-input').value.trim();

    btn.disabled = true;
    btn.style.display = 'none';
    spinner.style.display = 'inline-block';

    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age })
      });

      // Show success (no-cors doesn't give response body — that's OK)
      document.getElementById('dot-2').classList.remove('active');
      document.getElementById('dot-2').classList.add('done');
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success').classList.add('show');

    } catch (e) {
      spinner.style.display = 'none';
      btn.style.display = 'inline-flex';
      btn.disabled = false;
      err.textContent = 'Ошибка отправки. Проверьте интернет и попробуйте снова.';
      err.style.display = 'block';
    }
  }

  // Enter key support
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') goToQ2();
  });
</script>
</body>
</html>
